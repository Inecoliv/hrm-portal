<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INECOLIV Portal</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; width: 100%; max-width: 380px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        img.logo { max-width: 130px; margin-bottom: 15px; }
        .tab-btn { width: 50%; padding: 10px; cursor: pointer; border-bottom: 2px solid #eee; font-weight: bold; }
        .tab-btn.active { color: #c9302c; border-bottom: 2px solid #c9302c; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .cam-btn { background: #f8f9fa; border: 2px dashed #ddd; padding: 20px; border-radius: 10px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
        #preview { width: 100%; display: none; margin-top: 10px; border-radius: 8px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        #status { margin-top: 15px; padding: 12px; border-radius: 8px; display: none; font-size: 14px; font-weight: bold; }
        .err { background: #fee2e2; color: #991b1b; } .ok { background: #d1fae5; color: #065f46; } .load { background: #e0f2fe; color: #075985; }
    </style>
</head>
<body>
    <div class="card">
        <img src="Logo.png" class="logo" alt="INECOLIV Logo">
        <div style="display:flex; margin-bottom:20px;">
            <div id="t1" class="tab-btn active" onclick="sw('att')">Attendance</div>
            <div id="t2" class="tab-btn" onclick="sw('pw')">PIN</div>
        </div>
        <div class="input-group">
            <label>Employee Name</label>
            <select id="email">
                <option value="">-- Select Your Name --</option>
                <option value="inecolivtechnology@gmail.com">Manager</option>
                <option value="dinesh@inecoliv.com">Dinesh Kumar</option>
                <option value="vanitha@inecoliv.com">Vanitha</option>
                <option value="ambeprakashvyas@inecoliv.com">Ambe Prakash</option>
                <option value="sriram@inecoliv.com">Sriram</option>
            </select>
        </div>
        <div id="sect-att">
            <div class="input-group"><label>Enter PIN</label><input type="password" id="pw" placeholder="****"></div>
            <div class="cam-btn" onclick="document.getElementById('cam').click()">📷 Take Live Selfie
                <input type="file" id="cam" accept="image/*" capture="user" style="display:none" onchange="pre(event)">
                <img id="preview">
            </div>
            <button style="background:#10b981" onclick="run('Check In')">Check In</button>
            <button style="background:#ef4444" onclick="run('Check Out')">Check Out</button>
        </div>
        <div id="sect-pw" style="display:none">
            <div class="input-group"><label>Current PIN</label><input type="password" id="old"></div>
            <div class="input-group"><label>New PIN</label><input type="password" id="new"></div>
            <button style="background:#2563eb" onclick="run('Change Password')">Update PIN</button>
        </div>
        <div id="status"></div>
    </div>
    <script>
        // YOUR BRAND NEW URL IS RIGHT HERE!
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw0U3-iz0A37ftutIn8hZCo85amEc35cWmpjG6Z2Aqaa02h3op3IXz-Ua8Pn99mXGT_/exec";
        let rawPhoto = "";

        function sw(m) {
            document.getElementById('sect-att').style.display = m=='att'?'block':'none';
            document.getElementById('sect-pw').style.display = m=='pw'?'block':'none';
            document.getElementById('t1').className = m=='att'?'tab-btn active':'tab-btn';
            document.getElementById('t2').className = m=='pw'?'tab-btn active':'tab-btn';
            document.getElementById('status').style.display = 'none';
        }

        function pre(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image(); img.src = ev.target.result;
                img.onload = () => {
                    const c = document.createElement('canvas');
                    c.width = 600; c.height = (img.height/img.width)*600;
                    c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
                    rawPhoto = c.toDataURL('image/jpeg', 0.8);
                    document.getElementById('preview').src = rawPhoto;
                    document.getElementById('preview').style.display = 'block';
                };
            };
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        }

        function run(act) {
            const em = document.getElementById('email').value, s = document.getElementById('status');
            if(!em) { s.innerText="⚠️ Select Name"; s.className="err"; s.style.display="block"; return; }
            
            if(act === 'Change Password') {
                send({actionType: act, email: em, oldPassword: document.getElementById('old').value, newPassword: document.getElementById('new').value});
            } else {
                if(!rawPhoto || !document.getElementById('pw').value) { s.innerText="⚠️ PIN & Photo Required"; s.className="err"; s.style.display="block"; return; }
                s.innerText="📍 Getting GPS..."; s.className="load"; s.style.display="block";
                navigator.geolocation.getCurrentPosition(p => {
                    const lat = p.coords.latitude.toFixed(6), lon = p.coords.longitude.toFixed(6), ts = new Date().toLocaleString('en-GB', {timeZone:'Asia/Kolkata'});
                    const c = document.createElement('canvas'), ctx = c.getContext('2d'), pr = document.getElementById('preview');
                    c.width = pr.naturalWidth; c.height = pr.naturalHeight;
                    ctx.drawImage(pr, 0, 0);
                    ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0, c.height-60, c.width, 60);
                    ctx.fillStyle = "white"; ctx.font = "bold 16px Arial";
                    ctx.fillText(ts, 15, c.height-35); ctx.fillText(lat+", "+lon, 15, c.height-12);
                    send({actionType: act, email: em, password: document.getElementById('pw').value, location: lat+", "+lon, photoData: c.toDataURL('image/jpeg').split(',')[1]});
                }, () => { s.innerText="❌ Enable GPS/Location"; s.className="err"; }, {enableHighAccuracy:true});
            }
        }

        function send(d) {
            document.getElementById('status').innerText="⏳ Processing... Please wait.";
            document.getElementById('status').className="load";
            
            fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', body:JSON.stringify(d)})
            .then(() => {
                document.getElementById('status').innerText="✅ Successful! Check your Google Sheet.";
                document.getElementById('status').className="ok";
                rawPhoto=""; document.getElementById('preview').style.display='none';
                document.getElementById('pw').value = '';
            }).catch(() => { 
                document.getElementById('status').innerText="❌ Network Error. Try again."; 
                document.getElementById('status').className="err";
            });
        }
    </script>
</body>
</html>
