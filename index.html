<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INECOLIV Portal</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; width: 100%; max-width: 380px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        img.logo { max-width: 130px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; cursor: pointer; border-bottom: 2px solid #eee; font-weight: bold; font-size: 13px;}
        .tab-btn.active { color: #c9302c; border-bottom: 2px solid #c9302c; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .cam-btn { background: #f8f9fa; border: 2px dashed #ddd; padding: 20px; border-radius: 10px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
        #preview { width: 100%; display: none; margin-top: 10px; border-radius: 8px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        #status { margin-top: 15px; padding: 12px; border-radius: 8px; display: none; font-size: 14px; font-weight: bold; }
        .err { background: #fee2e2; color: #991b1b; border: 1px solid #f5c6cb;} 
        .ok { background: #d1fae5; color: #065f46; border: 1px solid #d6e9c6;} 
        .load { background: #e0f2fe; color: #075985; border: 1px solid #b3e5fc;}
    </style>
</head>
<body>
    <div class="card">
        <img src="Logo.png" class="logo" alt="INECOLIV Logo">
        <div style="display:flex; margin-bottom:20px;">
            <div id="t1" class="tab-btn active" onclick="sw('att')">Attendance</div>
            <div id="t2" class="tab-btn" onclick="sw('pw')">PIN</div>
            <div id="t3" class="tab-btn" onclick="sw('lv')">Leave</div>
            <div id="t4" class="tab-btn" onclick="sw('admin')" style="display:none;">Admin</div>
        </div>
        
        <div class="input-group">
            <label>Employee Name</label>
            <select id="email">
                <option value="">-- Loading Names... --</option>
            </select>
        </div>
        
        <div id="sect-att">
            <div class="input-group"><label>Enter PIN</label><input type="password" id="pw" placeholder="****"></div>
            <div class="cam-btn" onclick="document.getElementById('cam').click()">📷 Take Live Selfie
                <input type="file" id="cam" accept="image/*" capture="user" style="display:none" onchange="pre(event)">
                <img id="preview">
            </div>
            <button style="background:#10b981" onclick="run('Check In')">Check In</button>
            <button style="background:#ef4444" onclick="run('Check Out')">Check Out</button>
        </div>
        
        <div id="sect-pw" style="display:none">
            <div class="input-group"><label>Current PIN</label><input type="password" id="old"></div>
            <div class="input-group"><label>New PIN</label><input type="password" id="new"></div>
            <button style="background:#2563eb" onclick="run('Change Password')">Update PIN</button>
        </div>

        <div id="sect-lv" style="display:none">
            <div class="input-group"><label>Enter PIN</label><input type="password" id="lv-pw" placeholder="****"></div>
            <div class="input-group">
                <label>Leave Type</label>
                <select id="lv-type">
                    <option value="">-- Select Leave Type --</option>
                    <option value="Casual Leave">Casual Leave</option>
                    <option value="Sick Leave">Sick Leave</option>
                    <option value="Earned Leave">Earned Leave</option>
                </select>
            </div>
            <div class="input-group">
                <label>Duration</label>
                <select id="lv-duration">
                    <option value="Full Day">Full Day</option>
                    <option value="First Half">First Half</option>
                    <option value="Second Half">Second Half</option>
                </select>
            </div>
            <div class="input-group"><label>From Date</label><input type="date" id="lv-from"></div>
            <div class="input-group"><label>To Date</label><input type="date" id="lv-to"></div>
            <div class="input-group"><label>Reason</label><input type="text" id="lv-reason" placeholder="Brief reason for leave"></div>
            <button style="background:#f59e0b" onclick="run('Apply Leave')">Apply Leave</button>
        </div>

        <div id="sect-admin" style="display:none">
            <div class="input-group"><label>Admin PIN</label><input type="password" id="admin-pw" placeholder="****"></div>
            <div class="input-group"><label>Select Month to Archive</label><input type="month" id="admin-month"></div>
            <button style="background:#8b5cf6" onclick="run('Backup')">📥 Generate ZIP Backup</button>
            <button style="background:#ef4444; margin-top:15px;" onclick="if(confirm('WARNING: Did you download the backup first? This wipes the sheet!')) run('Clear Data')">🗑️ Wipe Data</button>
        </div>

        <div id="status"></div>
    </div>
    
    <script>
        // ⚠️ PASTE YOUR ACTUAL GOOGLE APPS SCRIPT URL HERE:
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw0U3-iz0A37ftutIn8hZCo85amEc35cWmpjG6Z2Aqaa02h3op3IXz-Ua8Pn99mXGT_/exec";
        let rawPhoto = "";

        window.onload = () => {
            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({actionType: 'Get Users'}) })
            .then(r => r.json())
            .then(res => {
                if(res.status === 'success') {
                    const sel = document.getElementById('email');
                    sel.innerHTML = '<option value="">-- Select Your Name --</option>';
                    res.users.forEach(u => sel.innerHTML += `<option value="${u.email}">${u.name}</option>`);
                }
            }).catch(e => document.getElementById('email').innerHTML = '<option value="">-- Error Loading Names --</option>');
        };

        // Magic logic to un-hide the Admin tab
        document.getElementById('email').addEventListener('change', function() {
            var em = this.value;
            // ⚠️ UPDATE THESE WITH YOUR ACTUAL ADMIN/BOSS EMAILS
            var admins = ["inecolivtechnology@gmail.com", "boss@yourcompany.com", "sriram@yourcompany.com"];
            document.getElementById('t4').style.display = admins.includes(em) ? 'block' : 'none';
            if(!admins.includes(em)) sw('att');
        });

        function sw(m) {
            document.getElementById('sect-att').style.display = m=='att'?'block':'none';
            document.getElementById('sect-pw').style.display = m=='pw'?'block':'none';
            document.getElementById('sect-lv').style.display = m=='lv'?'block':'none';
            document.getElementById('sect-admin').style.display = m=='admin'?'block':'none';
            
            document.getElementById('t1').className = m=='att'?'tab-btn active':'tab-btn';
            document.getElementById('t2').className = m=='pw'?'tab-btn active':'tab-btn';
            document.getElementById('t3').className = m=='lv'?'tab-btn active':'tab-btn';
            document.getElementById('t4').className = m=='admin'?'tab-btn active':'tab-btn';
            document.getElementById('status').style.display = 'none';
        }

        function pre(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image(); img.src = ev.target.result;
                img.onload = () => {
                    const c = document.createElement('canvas');
                    c.width = 600; c.height = (img.height/img.width)*600;
                    c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
                    rawPhoto = c.toDataURL('image/jpeg', 0.8);
                    document.getElementById('preview').src = rawPhoto;
                    document.getElementById('preview').style.display = 'block';
                };
            };
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        }

        function run(act) {
            const em = document.getElementById('email').value, s = document.getElementById('status');
            if(!em) { s.innerText="⚠️ Select Name"; s.className="err"; s.style.display="block"; return; }
            
            if(act === 'Change Password') {
                const o = document.getElementById('old').value, n = document.getElementById('new').value;
                if(!o || !n) { s.innerText="⚠️ Fill both PIN fields."; s.className="err"; s.style.display="block"; return; }
                send({actionType: act, email: em, oldPassword: o, newPassword: n});
                
            } else if (act === 'Apply Leave') {
                const lp = document.getElementById('lv-pw').value, lt = document.getElementById('lv-type').value;
                const ld = document.getElementById('lv-duration').value, lf = document.getElementById('lv-from').value;
                const lto = document.getElementById('lv-to').value, lr = document.getElementById('lv-reason').value;
                
                if(!lp || !lt || !lf || !lto) { s.innerText="⚠️ Fill PIN, Leave Type, and Dates."; s.className="err"; s.style.display="block"; return; }
                send({actionType: act, email: em, password: lp, leaveType: lt, leaveDuration: ld, fromDate: lf, toDate: lto, reason: lr});
                
            } else if (act === 'Backup' || act === 'Clear Data') {
                const apw = document.getElementById('admin-pw').value;
                const am = document.getElementById('admin-month').value;
                if(!apw || !am) { s.innerText="⚠️ Admin PIN and Month required."; s.className="err"; s.style.display="block"; return; }
                send({actionType: act, email: em, password: apw, month: am});

            } else {
                if(!rawPhoto || !document.getElementById('pw').value) { s.innerText="⚠️ PIN & Photo Required"; s.className="err"; s.style.display="block"; return; }
                s.innerText="📍 Getting GPS..."; s.className="load"; s.style.display="block";
                navigator.geolocation.getCurrentPosition(p => {
                    const lat = p.coords.latitude.toFixed(6), lon = p.coords.longitude.toFixed(6), ts = new Date().toLocaleString('en-GB', {timeZone:'Asia/Kolkata'});
                    const c = document.createElement('canvas'), ctx = c.getContext('2d'), pr = document.getElementById('preview');
                    c.width = pr.naturalWidth; c.height = pr.naturalHeight;
                    ctx.drawImage(pr, 0, 0);
                    ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0, c.height-60, c.width, 60);
                    ctx.fillStyle = "white"; ctx.font = "bold 16px Arial";
                    ctx.fillText(ts, 15, c.height-35); ctx.fillText(lat+", "+lon, 15, c.height-12);
                    send({actionType: act, email: em, password: document.getElementById('pw').value, location: lat+", "+lon, photoData: c.toDataURL('image/jpeg').split(',')[1]});
                }, () => { s.innerText="❌ Enable GPS/Location"; s.className="err"; }, {enableHighAccuracy:true});
            }
        }

        // --- UPDATED SEND FUNCTION WITH SAFETY NET ---
        function send(d) {
            const s = document.getElementById('status');
            s.innerText="⏳ Processing... Please wait."; s.className="load"; s.style.display="block";
            
            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(d) })
            .then(r => r.text()) // Grab raw text first to prevent JSON crash
            .then(text => {
                try {
                    const res = JSON.parse(text);
                    s.innerText = res.message;
                    s.className = (res.status === 'success') ? "ok" : "err";
                    
                    if(res.status === 'success') {
                        // Triggers download ONLY if the backend sends a link (which we removed, but harmless to leave here just in case)
                        if (res.downloadLink) window.open(res.downloadLink, '_blank'); 
                        
                        if (d.actionType === 'Change Password') {
                            document.getElementById('old').value = ''; document.getElementById('new').value = '';
                        } else if (d.actionType === 'Apply Leave') {
                            document.getElementById('lv-pw').value = ''; document.getElementById('lv-type').value = '';
                            document.getElementById('lv-duration').value = 'Full Day'; document.getElementById('lv-from').value = '';
                            document.getElementById('lv-to').value = ''; document.getElementById('lv-reason').value = '';
                        } else if (d.actionType === 'Check In' || d.actionType === 'Check Out') {
                            rawPhoto=""; document.getElementById('preview').style.display='none'; document.getElementById('pw').value = '';
                        }
                    }
                } catch (jsonError) {
                    // This catches the Google HTML Quota error gracefully!
                    console.error("Google Server Response:", text);
                    s.innerText="❌ Server Blocked Request (Quota Reached or Network Issue).";
                    s.className="err";
                }
            }).catch(e => { 
                s.innerText="❌ Critical Network Error. Check connection."; 
                s.className="err"; 
            });
        }
    </script>
</body>
</html>
